# PatrickOS Alpha — Keyboard Compatibility Layer (X11).
# Refuerza el layout latam dentro de Xorg/XFCE, para que GUI y consola
# converjan. Si esto choca con localectl/gnome-settings-daemon, gana este
# archivo porque los includes.d se aplican después de las defaults.
#
# Cambiar en runtime sin tocar esto:  setxkbmap latam

Section "InputClass"
    Identifier "system-keyboard"
    MatchIsKeyboard "on"
    Option "XkbModel" "pc105"
    Option "XkbLayout" "latam"
    Option "XkbVariant" ""
EndSection
